<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F59E0B" />
    <meta name="description" content="CrowdSense — Real-time sports venue intelligence. Navigate crowds, order food, and engage with your stadium like never before." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Google Fonts: Bebas Neue + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />

    <title>CrowdSense — Venue Intelligence</title>
  </head>
  <body>
    <!-- Prevent flash of wrong theme — runs synchronously before React -->
    <script>
      (function() {
        try {
          var prefs = JSON.parse(localStorage.getItem('crowdsense-prefs') || '{}');
          var theme = prefs.theme || 'dark';
          var compact = prefs.compactView || false;
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.setAttribute('data-compact', String(compact));
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
